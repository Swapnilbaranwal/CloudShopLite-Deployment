name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: 386318839776.dkr.ecr.us-east-1.amazonaws.com/swapnil
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./API
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ env.IMAGE_TAG }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./Worker
          push: true
          tags: ${{ env.REGISTRY }}/worker:${{ env.IMAGE_TAG }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Deploy to EKS using Helm
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm upgrade --install cloudshop ./helm \
            --set api.image.tag=${{ env.IMAGE_TAG }} \
            --set frontend.image.tag=${{ env.IMAGE_TAG }} \
            --set worker.image.tag=${{ env.IMAGE_TAG }}
