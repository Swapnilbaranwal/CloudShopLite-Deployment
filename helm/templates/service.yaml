{{- range $name, $svc := .Values.services }}

apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-service
  labels:
    app: {{ $name }}

spec:
  type: {{ $svc.type }}

  selector:
    app: {{ $name }}

  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP

---
{{- end }}