apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: 386318839776.dkr.ecr.us-east-1.amazonaws.com/swapnil/redis:7
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
        

          resources:
            requests:
              cpu: "100m"      # minimum guaranteed CPU
              memory: "128Mi"
            limits:
              cpu: "500m"      # max CPU it can use
              memory: "256Mi"
          