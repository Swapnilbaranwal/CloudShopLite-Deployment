apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend-app
          image: 386318839776.dkr.ecr.us-east-1.amazonaws.com/swapnil/frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: http://swapnil-api-service:5000
          
          resources:
            requests:
              cpu: "100m"     
              memory: "128Mi"
            limits:
              cpu: "500m"      
              memory: "256Mi"
              